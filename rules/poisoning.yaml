# mcp-audit poisoning pattern pack (v1)
# These mirror the in-code defaults so rules can be extended without a release.
# Each rule: id, severity, owasp_id, confidence, and a regex (Python syntax).

version: 1
rules:
  - id: D1-EXFIL
    severity: CRITICAL
    owasp_id: MCP03
    confidence: high
    description: Action verb near an external destination (data exfiltration).
    pattern: '\b(send|post|upload|exfiltrat|forward|transmit|leak)\b[^.]{0,60}(https?://|webhook|endpoint)'

  - id: D1-SENSITIVE-READ
    severity: HIGH
    owasp_id: MCP03
    confidence: high
    description: Reference to credentials / secret file paths.
    pattern: '(~/?\.ssh|id_rsa|\.env\b|\.aws/credentials|/etc/passwd|\.netrc)'

  - id: D1-DIRECTIVE
    severity: MEDIUM
    owasp_id: MCP03
    confidence: medium
    description: Model-directed imperative rather than a tool description.
    pattern: '\b(ignore (all |the )?previous|do not (tell|reveal)|you must|always (call|run))\b'
