name: mcp-rugpull-canary

# Demonstrates rug-pull drift detection (a tracked MCP server's tool definitions changing after
# a clean install) on the bundled demo server. It baselines the server, then diffs against that
# baseline: if a tool description or schema drifted, `diff` exits non-zero and the job fails.
#
# To watch a REAL server, point the --stdio command at it and commit the baseline so the diff
# runs against a known-good version across days rather than re-baselining each run.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 12 * * *"   # daily

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install mcp-audit from source
        run: pip install .

      - name: Baseline the demo server's tool definitions
        run: mcp-audit baseline --stdio "python fixtures/evil_server.py"

      - name: Diff against the baseline (fails if the tools drifted)
        run: mcp-audit diff --stdio "python fixtures/evil_server.py"
